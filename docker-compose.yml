version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tradeuser
      POSTGRES_PASSWORD: tradepass
      POSTGRES_DB: tradedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    command: celery -A tasks.celery_tasks worker --loglevel=info -Q orders,settlements
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - db
      - redis

  celery_beat:
    build: ./backend
    command: celery -A tasks.celery_tasks beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: